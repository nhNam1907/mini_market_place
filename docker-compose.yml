services:
  db:
    image: postgres:16-alpine
    container_name: market-place-db
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: market-place-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      CLIENT_URL: http://localhost:8080
      DATABASE_URL: postgresql://postgres:postgres@db:5432/marketplace?schema=public
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: market-place-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
